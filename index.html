<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090b10; --s1:#11141c; --s2:#181c28; --s3:#1f2436;
  --brd:#272d3f; --tx:#e4e8f4; --tx2:#7b829a; --tx3:#50566e;
  --acc:#22d3a7; --acc2:#1ab892; --accBg:rgba(34,211,167,.08);
  --red:#ef4466; --redBg:rgba(239,68,102,.08);
  --blue:#4c9aff; --orange:#f5a623; --purple:#a78bfa;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--brd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--acc)}
.hdr-actions{display:flex;gap:6px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--s2);color:var(--tx);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600}
.btn-g:hover{background:var(--acc2)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px 20px}
.scard{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.c-all::after{background:var(--acc)} .scard.c-pk::after{background:#4ade80} .scard.c-op::after{background:var(--purple)} .scard.c-rev::after{background:var(--orange)} .scard.c-pl::after{background:var(--blue)}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:4px}
.sval{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1.2}
.ssub{font-size:11px;color:var(--tx3);margin-top:3px}
.srow{display:flex;gap:12px;margin-top:6px}
.srow-item{font-size:11px;color:var(--tx2)}
.srow-item b{color:var(--tx);font-weight:600}
.green{color:var(--acc)} .red{color:var(--red)}

/* FILTERS */
.filters{padding:0 20px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tab{padding:5px 12px;border-radius:16px;border:1px solid var(--brd);background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s}
.tab.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600}
.tab:hover:not(.on){border-color:var(--tx2);color:var(--tx)}
.fsel{padding:5px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--s2);color:var(--tx);font-family:inherit;font-size:12px;cursor:pointer;outline:none}
.spacer{flex:1}
.search-box{padding:5px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--s2);color:var(--tx);font-family:inherit;font-size:12px;width:180px;outline:none}
.search-box:focus{border-color:var(--acc)}

/* TABLE */
.twrap{padding:0 20px 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;white-space:nowrap;position:relative}
th:hover{color:var(--tx2)}
th .arrow{font-size:9px;margin-left:3px;opacity:.5}
th.sorted .arrow{opacity:1;color:var(--acc)}
td{padding:8px 10px;border-bottom:1px solid rgba(39,45,63,.5);font-size:13px;white-space:nowrap}
tr:hover td{background:var(--s2)}
.jb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px}
.jb-OP{background:rgba(167,139,250,.12);color:var(--purple)}
.jb-PK{background:rgba(74,222,128,.1);color:#4ade80}
.st-Stock{color:var(--blue)} .st-Vendu{color:var(--orange)}
.text-r{text-align:right} .text-c{text-align:center}
.mkt-tag{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px}
.mkt-up{background:rgba(34,211,167,.1);color:var(--acc)}
.mkt-down{background:rgba(239,68,102,.1);color:var(--red)}
.del-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;padding:2px;opacity:0;transition:all .15s}
tr:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}

/* PROGRESS */
.pbar{display:none;padding:8px 20px}
.pbar.show{display:block}
.pinner{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px}
.ptxt{font-size:12px;color:var(--tx2);margin-bottom:6px}
.ptrack{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s;width:0}
.plog{margin-top:6px;max-height:200px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);white-space:pre-wrap;word-break:break-all}
.plog div{padding:1px 0}
.log-ok{color:var(--acc)} .log-err{color:var(--red)} .log-skip{color:var(--orange)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:200}
.modal-ov.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:20px;width:400px;max-width:90vw}
.modal h3{margin-bottom:14px;font-size:16px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--tx2);margin-bottom:3px}
.fg input,.fg select{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--s2);color:var(--tx);font-family:inherit;font-size:13px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-acts{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}

/* RESPONSIVE */
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.sval{font-size:20px}}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr}.hdr{flex-wrap:wrap;gap:8px}.hdr-actions{width:100%;justify-content:flex-end}.twrap{padding:0 8px 8px}td,th{padding:6px 5px;font-size:11px}.search-box{width:120px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🃏 TCG <span>Tracker</span></div>
  <div class="hdr-actions">
    <button class="btn" onclick="updatePrices()" id="btnMaj">🔄 Màj Prix</button>
    <button class="btn" onclick="exportCSV()">📥 CSV</button>
    <button class="btn btn-g" onclick="showModal()">+ Ajouter</button>
  </div>
</div>

<div class="stats-grid" id="stats"></div>

<div class="pbar" id="pbar">
  <div class="pinner">
    <div class="ptxt" id="ptxt">Mise à jour des prix…</div>
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="plog" id="plog"></div>
  </div>
</div>

<div class="filters">
  <button class="tab on" data-f="all" onclick="gf('all',this)">Tous</button>
  <button class="tab" data-f="OP" onclick="gf('OP',this)">One Piece</button>
  <button class="tab" data-f="PK" onclick="gf('PK',this)">Pokémon</button>
  <select class="fsel" onchange="sf(this.value)"><option value="all">Tous statuts</option><option value="Stock">En stock</option><option value="Vendu">Vendus</option></select>
  <select class="fsel" onchange="tf(this.value)"><option value="all">Tous types</option><option value="Carte">Cartes</option><option value="Booster">Boosters</option><option value="Scellé">Scellés</option><option value="Display">Displays</option><option value="Gradée">Gradées</option></select>
  <div class="spacer"></div>
  <input class="search-box" placeholder="🔍 Rechercher…" oninput="searchF(this.value)">
</div>

<div class="twrap">
  <table>
    <thead><tr>
      <th onclick="sb('jeu')">Jeu <span class="arrow">▼</span></th>
      <th onclick="sb('nom')">Nom <span class="arrow">▼</span></th>
      <th onclick="sb('type')">Type <span class="arrow">▼</span></th>
      <th onclick="sb('qte')" class="text-c">Qté <span class="arrow">▼</span></th>
      <th onclick="sb('statut')">Statut <span class="arrow">▼</span></th>
      <th onclick="sb('cout_total')" class="text-r">Coût <span class="arrow">▼</span></th>
      <th onclick="sb('prix_marche')" class="text-r">Marché <span class="arrow">▼</span></th>
      <th onclick="sb('vente')" class="text-r">Vente <span class="arrow">▼</span></th>
      <th onclick="sb('pl')" class="text-r">P&L <span class="arrow">▼</span></th>
      <th onclick="sb('date_achat')">Date <span class="arrow">▼</span></th>
      <th></th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<div class="modal-ov" id="addM" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <h3>Ajouter un item</h3>
    <div class="fr"><div class="fg"><label>Jeu</label><select id="fJ"><option value="OP">One Piece</option><option value="PK">Pokémon</option></select></div><div class="fg"><label>Type</label><select id="fT"><option>Carte</option><option>Booster</option><option>Scellé</option><option>Display</option><option>Gradée</option></select></div></div>
    <div class="fg"><label>Nom</label><input id="fN" placeholder="Ex: Monkey.D.Luffy (OP13-118) (V.5)"></div>
    <div class="fg"><label>Expansion</label><input id="fE" placeholder="Ex: Two Legends"></div>
    <div class="fr"><div class="fg"><label>Quantité</label><input id="fQ" type="number" value="1" min="1"></div><div class="fg"><label>Prix unitaire (€)</label><input id="fP" type="number" step="0.01"></div></div>
    <div class="fr"><div class="fg"><label>Date d'achat</label><input id="fD" type="date"></div><div class="fg"><label>Source</label><select id="fS"><option>Cardmarket</option><option>Vinted</option><option>Autre</option></select></div></div>
    <div class="modal-acts"><button class="btn" onclick="closeM()">Annuler</button><button class="btn btn-g" onclick="addItem()">Ajouter</button></div>
  </div>
</div>

function calcStats(list){
  const stock=list.filter(i=>i.statut==='Stock');
  const sold=list.filter(i=>i.statut==='Vendu');
  const invested=list.reduce((s,i)=>s+(i.cout_total||0),0);
  const stockVal=stock.reduce((s,i)=>s+(i.prix_marche?i.prix_marche*i.qte:0),0);
  const soldGross=sold.reduce((s,i)=>s+(i.vente_total||0),0);
  const soldNet=sold.reduce((s,i)=>{const v=i.vente_total||0;return s+(v-v*CM_FEE)},0);
  const costSold=sold.reduce((s,i)=>s+(i.cout_total||0),0);
  const pl=soldNet-costSold;
  const unrealPL=stock.reduce((s,i)=>{if(!i.prix_marche)return s;return s+(i.prix_marche*i.qte-(i.cout_total||0))},0);
  return{total:list.length,stock:stock.length,sold:sold.length,invested,stockVal,soldGross,soldNet,costSold,pl,unrealPL,
    roi:invested>0?(pl/invested*100):0,
    stockWithPrice:stock.filter(i=>i.prix_marche).length};
}

    <div class="scard c-all">
      <div class="slbl">Total Investi</div>
      <div class="sval">${F(all.invested)}</div>
      <div class="ssub">${all.total} items</div>
      <div class="srow">
        <div class="srow-item">🟢 PK <b>${F(pk.invested)}</b></div>
        <div class="srow-item">🟣 OP <b>${F(op.invested)}</b></div>
      </div>
    </div>
    <div class="scard c-pk">
      <div class="slbl">Valeur Stock</div>
      <div class="sval">${all.stockVal>0?F(all.stockVal):'—'}</div>
      <div class="ssub">${all.stock} en portefeuille (${all.stockWithPrice} pricés)</div>
      <div class="srow">
        <div class="srow-item">🟢 PK <b>${pk.stockVal>0?F(pk.stockVal):'—'}</b></div>
        <div class="srow-item">🟣 OP <b>${op.stockVal>0?F(op.stockVal):'—'}</b></div>
      </div>
    </div>
    <div class="scard c-rev">
      <div class="slbl">Revenus Ventes</div>
      <div class="sval">${F(all.soldNet)}</div>
      <div class="ssub">${all.sold} vendus · net frais 5%</div>
      <div class="srow">
        <div class="srow-item">🟢 PK <b>${F(pk.soldNet)}</b></div>
        <div class="srow-item">🟣 OP <b>${F(op.soldNet)}</b></div>
      </div>
    </div>
    <div class="scard c-pl">
      <div class="slbl">P&L Réalisé</div>
      <div class="sval ${all.pl>=0?'green':'red'}">${all.pl>=0?'+':''}${F(all.pl)}</div>
      <div class="ssub">ROI ${all.roi.toFixed(1)}%</div>
      <div class="srow">
        <div class="srow-item">🟢 <b class="${pk.pl>=0?'green':'red'}">${pk.pl>=0?'+':''}${F(pk.pl)}</b></div>
        <div class="srow-item">🟣 <b class="${op.pl>=0?'green':'red'}">${op.pl>=0?'+':''}${F(op.pl)}</b></div>
      </div>
    </div>
    <div class="scard c-op">
      <div class="slbl">P&L Latent (stock)</div>
      <div class="sval ${all.unrealPL>=0?'green':'red'}">${all.unrealPL!==0?((all.unrealPL>=0?'+':'')+F(all.unrealPL)):'—'}</div>
      <div class="ssub">basé sur prix marché</div>
      <div class="srow">
        <div class="srow-item">🟢 <b class="${pk.unrealPL>=0?'green':'red'}">${pk.unrealPL!==0?F(pk.unrealPL):'—'}</b></div>
        <div class="srow-item">🟣 <b class="${op.unrealPL>=0?'green':'red'}">${op.unrealPL!==0?F(op.unrealPL):'—'}</b></div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════
function renderTable(){
  let fl=items.filter(i=>{
    if(gameF!=='all'&&i.jeu!==gameF)return false;
    if(statusF!=='all'&&i.statut!==statusF)return false;
    if(typeF!=='all'&&i.type!==typeF)return false;
    if(searchQ){const q=searchQ.toLowerCase();if(!i.nom.toLowerCase().includes(q)&&!(i.expansion||'').toLowerCase().includes(q))return false}
    return true;
  });
  fl.sort((a,b)=>{
    let va=sortC==='pl'?cpl(a):a[sortC],vb=sortC==='pl'?cpl(b):b[sortC];
    if(va==null)va=sortD>0?Infinity:-Infinity;
    if(vb==null)vb=sortD>0?Infinity:-Infinity;
    if(typeof va==='string')return va.localeCompare(vb)*sortD;
    return(va-vb)*sortD;
  });
  // Update th sorted state
  document.querySelectorAll('th').forEach(th=>{th.classList.remove('sorted')});
  
  const tb=document.getElementById('tb');
  if(!fl.length){tb.innerHTML='<tr><td colspan="11" class="empty">Aucun item trouvé</td></tr>';return}
  tb.innerHTML=fl.map(i=>{
    const pl=cpl(i);
    const plC=pl>0?'green':pl<0?'red':'';
    const m=i.prix_marche;
    const mD=m?F(m):'—';
    let mTag='';
    if(m&&i.cout&&i.statut==='Stock'){
      const diff=((m-i.cout)/i.cout*100);
      mTag=`<span class="mkt-tag ${diff>=0?'mkt-up':'mkt-down'}">${diff>=0?'+':''}${diff.toFixed(0)}%</span>`;
    }
    const d=i.date_achat||'';
    return `<tr>
      <td><span class="jb jb-${i.jeu}">${i.jeu}</span></td>
      <td title="${esc(i.expansion||'')}">${esc(trunc(i.nom,32))}</td>
      <td>${i.type}</td>
      <td class="text-c">${i.qte}</td>
      <td><span class="st-${i.statut}">${i.statut}</span></td>
      <td class="text-r mono">${F(i.cout_total)}</td>
      <td class="text-r mono">${i.statut==='Stock'?(mD+mTag):'—'}</td>
      <td class="text-r mono">${i.statut==='Vendu'&&i.vente!=null?F(i.vente):'—'}</td>
      <td class="text-r mono ${plC}">${pl!==null?(pl>=0?'+':'')+F(pl):'—'}</td>
      <td class="mono" style="font-size:11px;color:var(--tx3)">${d}</td>
      <td><button class="del-btn" onclick="del(${i.id})" title="Supprimer">✕</button></td>
    </tr>`}).join('');
}

function cpl(i){
  if(i.statut==='Vendu'&&i.vente!=null){const g=i.vente_total||i.vente*i.qte;return g-g*CM_FEE-(i.cout_total||0)}
  if(i.statut==='Stock'&&i.prix_marche)return i.prix_marche*i.qte-(i.cout_total||0);
  return null;
}
function F(n){return n!=null?n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' €':'—'}
function trunc(s,n){return s.length>n?s.substring(0,n)+'…':s}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function render(){renderStats();renderTable()}

// ══════════════════════════════════════════
// FILTERS / SORT
// ══════════════════════════════════════════
function gf(f,el){gameF=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderTable()}
function sf(v){statusF=v;renderTable()}
function tf(v){typeF=v;renderTable()}
function searchF(v){searchQ=v;renderTable()}
function sb(c){if(sortC===c)sortD*=-1;else{sortC=c;sortD=c==='nom'||c==='jeu'?1:-1}renderTable()}

// ══════════════════════════════════════════
// ADD / DELETE
// ══════════════════════════════════════════
function showModal(){document.getElementById('addM').classList.add('show')}
function closeM(){document.getElementById('addM').classList.remove('show')}
function addItem(){
  const nom=document.getElementById('fN').value.trim();
  if(!nom)return alert('Nom requis');
  const prix=parseFloat(document.getElementById('fP').value)||0;
  const qte=parseInt(document.getElementById('fQ').value)||1;
  items.push({
    id:nid(),jeu:document.getElementById('fJ').value,nom,nom_en:'',
    type:document.getElementById('fT').value,qte,statut:'Stock',
    cout:prix,cout_total:+(prix*qte).toFixed(2),vente:null,vente_total:null,
    source:document.getElementById('fS').value,
    date_achat:document.getElementById('fD').value||new Date().toISOString().slice(0,10),
    expansion:document.getElementById('fE').value||null,product_id:null,prix_marche:null
  });
  save();render();closeM();
  ['fN','fP','fE'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fQ').value='1';
}
function del(id){if(!confirm('Supprimer ?'))return;items=items.filter(i=>i.id!==id);save();render()}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportCSV(){
  const h='Jeu;Nom;Type;Qté;Statut;Coût Unit;Coût Total;Prix Marché;Prix Vente;P&L;Source;Date;Expansion\n';
  const r=items.map(i=>[i.jeu,`"${i.nom}"`,i.type,i.qte,i.statut,i.cout,i.cout_total,i.prix_marche||'',i.vente||'',cpl(i)||'',i.source||'',i.date_achat||'',`"${i.expansion||''}"`].join(';')).join('\n');
  const b=new Blob([h+r],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tcg_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ══════════════════════════════════════════
// PRICE UPDATE
// ══════════════════════════════════════════
async function updatePrices(){
  const cards=items.filter(i=>i.statut==='Stock'&&i.type==='Carte');
  if(!cards.length)return alert('Aucune carte en stock.');
  const opC=cards.filter(i=>i.jeu==='OP'), pkC=cards.filter(i=>i.jeu==='PK');
  const bar=document.getElementById('pbar'),fill=document.getElementById('pfill'),
    txt=document.getElementById('ptxt'),log=document.getElementById('plog');
  bar.classList.add('show');log.innerHTML='';fill.style.width='0%';
  document.getElementById('btnMaj').disabled=true;
  let done=0,ok=0,err=0;const total=cards.length;

  // ── ONE PIECE: OPTCG API first, local fallback ──
  if(opC.length){
    alog(log,'━━━ ONE PIECE ('+opC.length+' cartes) ━━━','');
    for(const item of opC){
      done++;fill.style.width=Math.round(done/total*100)+'%';
      txt.textContent=`${done}/${total} (${ok} ok, ${err} err)`;
      // Try OPTCG API first
      let price=null;
      const num=extractNum(item);
      if(num){
        try{
          const r=await fetch(OPTCG_API+'/'+num+'/');
          if(r.ok){
            const d=await r.json();
            const mp=d.market_price||d.inventory_price;
            if(mp&&mp>0){price=+(mp*USD_EUR).toFixed(2);alog(log,`✓ ${item.nom}: $${mp} → ${price}€ (OPTCG API)`,'log-ok')}
          }
        }catch(e){}
      }
      // Fallback to local cardlist
      if(price===null){
        price=getLocalOP(item);
        if(price!==null){alog(log,`✓ ${item.nom}: ${price.toFixed(2)}€ (cardlist locale)`,'log-ok')}
        else{alog(log,`⊘ ${item.nom}: non trouvé`,'log-skip')}
      }
      if(price!==null){item.prix_marche=price;ok++}
      if(done<total)await sl(300);
    }
  }

  // ── POKÉMON: Cardmarket API ──
  if(pkC.length){
    alog(log,'\n━━━ POKÉMON ('+pkC.length+' cartes, API Cardmarket) ━━━','');
    for(const item of pkC){
      done++;fill.style.width=Math.round(done/total*100)+'%';
      txt.textContent=`${done}/${total} (${ok} ok, ${err} err)`;
      try{
        const price=await fetchPK(item);
        if(price!==null){item.prix_marche=price;ok++;alog(log,`✓ ${item.nom}: ${price.toFixed(2)}€`,'log-ok')}
        else{alog(log,`⊘ ${item.nom}: non trouvé`,'log-skip')}
      }catch(e){
        err++;alog(log,`✗ ${item.nom}: ${e.message}`,'log-err');
        if(e.message.includes('429')){alog(log,'🛑 Rate limit — stop PK.','log-err');break}
      }
      if(done<total)await sl(800);
    }
  }

  save();render();
  txt.textContent=`✅ Terminé: ${ok} prix mis à jour, ${err} erreurs sur ${total} cartes`;
  document.getElementById('btnMaj').disabled=false;
}

function extractNum(item){
  const n=item.nom_en||item.nom;
  const m=n.match(/((?:OP|ST|EB|PRB|P)\d*-\d+)/i);
  return m?m[1].toUpperCase():null;
}

function getLocalOP(item){
  const num=extractNum(item);
  if(!num)return null;
  const v=OP_PRICES[num];
  if(!v||!v.length)return null;
  const vm=(item.nom_en||item.nom).match(/\(V\.(\d+)\)/i);
  if(vm){const ex=v.find(x=>x[0].includes('(V.'+vm[1]+')'));if(ex)return ex[1]}
  const sorted=[...v].sort((a,b)=>a[1]-b[1]);
  return sorted[0][1];
}

async function fetchPK(item){
  const n=item.nom_en||item.nom;
  let q=n.replace(/\(V\.\d+\)/g,'').replace(/\([^)]*\)/g,'').replace(/\d+\/\d+/g,'')
    .replace(/gradée?/gi,'').replace(/PCA\d+/gi,'').replace(/PSA\d+/gi,'')
    .replace(/CCC\s*\d+\.?\d*/gi,'').replace(/\./g,' ').replace(/\s+/g,' ').trim();
  const w=q.split(/\s+/).filter(x=>x.length>1);
  q=w.slice(0,3).join(' ');
  if(!q||q.length<2)return null;
  const r=await fetch(`https://${PK_HOST}/pokemon/cards?search=${encodeURIComponent(q)}`,
    {headers:{'x-rapidapi-key':API_KEY,'x-rapidapi-host':PK_HOST}});
  if(r.status===429)throw new Error('429 Rate limit');
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  const cards=d.data||[];
  if(!cards.length)return null;
  const c=cards[0];
  const p=c.prices||{};
  const cm=p.cardmarket||p;
  for(const k of['lowest_near_mint_FR','lowest_near_mint','30d_average','7d_average','trend','low','price']){
    const v=cm[k];if(typeof v==='number'&&v>0)return v;
    if(typeof v==='string'){const n=parseFloat(v);if(!isNaN(n)&&n>0)return n}
  }
  if(typeof c.price_from==='number'&&c.price_from>0)return c.price_from;
  return null;
}

function alog(el,m,c){const d=document.createElement('div');d.className=c||'';d.textContent=m;el.appendChild(d);el.scrollTop=el.scrollHeight}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}

function resetAll(){if(!confirm('Réinitialiser toutes les données ?'))return;localStorage.removeItem('tcg_v3');items=J(SEED);save();render()}
