<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TCG Tracker — licar92</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222537;
    --border: #2e3248;
    --accent-op: #e8a317;
    --accent-pk: #6c8ef5;
    --green: #3ecf8e;
    --red: #f25f5c;
    --text: #e8e9f0;
    --muted: #7b7f9e;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; padding-bottom: 80px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: .5px; }
  header h1 span { color: var(--accent-op); }
  .sync-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .2s; }
  .sync-btn:hover { border-color: var(--accent-op); color: var(--accent-op); }
  .sync-btn.syncing { color: var(--accent-op); border-color: var(--accent-op); }

  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 53px; z-index: 99; }
  .tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent-op); }

  .page { display: none; padding: 12px; }
  .page.active { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-card .label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-card.full { grid-column: 1/-1; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; margin-top: 8px; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent-op); }
  .filter-btn.op.active { background: rgba(232,163,23,.15); color: var(--accent-op); border-color: var(--accent-op); }
  .filter-btn.pk.active { background: rgba(108,142,245,.15); color: var(--accent-pk); border-color: var(--accent-pk); }

  .search-box { width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; margin-bottom: 10px; outline: none; transition: border-color .2s; }
  .search-box:focus { border-color: var(--accent-op); }
  .search-box::placeholder { color: var(--muted); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .jeu-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 800; letter-spacing: .5px; flex-shrink: 0; margin-top: 2px; }
  .jeu-badge.OP { background: rgba(232,163,23,.2); color: var(--accent-op); }
  .jeu-badge.PK { background: rgba(108,142,245,.2); color: var(--accent-pk); }
  .card-name { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.3; }
  .card-set { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .price-info { display: flex; align-items: center; gap: 10px; }
  .price-main { font-size: 13px; font-weight: 600; }
  .price-date { font-size: 11px; color: var(--muted); }
  .card-actions { display: flex; gap: 6px; }

  .btn-sell { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid rgba(62,207,142,.3); padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-sell:hover { background: rgba(62,207,142,.25); }
  .btn-del { background: none; color: var(--muted); border: 1px solid var(--border); padding: 5px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .btn-del:hover { color: var(--red); border-color: var(--red); }

  .pnl-badge { padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .pnl-badge.pos { background: rgba(62,207,142,.15); color: var(--green); }
  .pnl-badge.neg { background: rgba(242,95,92,.15); color: var(--red); }
  .pnl-badge.unknown { background: rgba(123,127,158,.1); color: var(--muted); }

  .qty-badge { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }

  .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-op); color: #000; font-size: 24px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,163,23,.4); z-index: 200; transition: transform .2s; }
  .fab:active { transform: scale(.93); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent-op); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-primary { width: 100%; padding: 13px; background: var(--accent-op); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity .2s; }
  .btn-primary:active { opacity: .85; }

  .import-area { background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
  .import-area textarea { width: 100%; min-height: 80px; background: transparent; border: none; color: var(--text); font-size: 12px; font-family: monospace; resize: vertical; outline: none; }
  .import-area textarea::placeholder { color: var(--muted); }

  .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .settings-section h4 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }

  .info-banner { background: rgba(232,163,23,.1); border: 1px solid rgba(232,163,23,.25); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #f0c060; margin-bottom: 12px; line-height: 1.5; }

  .src-badge { font-size: 10px; color: var(--muted); background: var(--surface2); border-radius: 3px; padding: 1px 5px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @media (min-width: 600px) { body { max-width: 500px; margin: 0 auto; } }
</style>
</head>
<body>

<header>
  <h1>TCG <span>licar92</span></h1>
  <button class="sync-btn" id="syncBtn" onclick="syncGitHub()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c-1.66 0-3-4.03-3-9s1.34-9 3-9m0 18c1.66 0 3-4.03 3-9s-1.34-9-3-9"/></svg>
    Sync
  </button>
</header>

<nav class="tabs">
  <div class="tab active" onclick="showPage('dashboard')">📊 Résumé</div>
  <div class="tab" onclick="showPage('stock')">📦 Stock</div>
  <div class="tab" onclick="showPage('ventes')">💸 Ventes</div>
  <div class="tab" onclick="showPage('settings')">⚙️</div>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="statsGrid" class="stats-grid"></div>
  <div class="stats-grid" id="repartition"></div>
</div>

<!-- STOCK -->
<div class="page" id="page-stock">
  <div class="filter-row">
    <button class="filter-btn active" id="sfAll" onclick="setFilter('stock','all')">Tous</button>
    <button class="filter-btn op" id="sfOP" onclick="setFilter('stock','OP')">One Piece</button>
    <button class="filter-btn pk" id="sfPK" onclick="setFilter('stock','PK')">Pokémon</button>
  </div>
  <input type="text" class="search-box" placeholder="Rechercher..." id="searchStock" oninput="renderStock()">
  <div id="stockList"></div>
</div>

<!-- VENTES -->
<div class="page" id="page-ventes">
  <div class="info-banner" id="costAlert" style="display:none">
    ⚠️ <strong id="costCount">0</strong> vente(s) sans coût d'achat — cliquer sur <strong>+ coût</strong> pour compléter le P&L.
  </div>
  <div class="filter-row">
    <button class="filter-btn active" id="vfAll" onclick="setFilter('vente','all')">Toutes</button>
    <button class="filter-btn op" id="vfOP" onclick="setFilter('vente','OP')">One Piece</button>
    <button class="filter-btn pk" id="vfPK" onclick="setFilter('vente','PK')">Pokémon</button>
  </div>
  <input type="text" class="search-box" placeholder="Rechercher..." id="searchVente" oninput="renderVentes()">
  <div id="venteList"></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="settings-section">
    <h4>GitHub Sync</h4>
    <div class="form-group"><label>Utilisateur GitHub</label><input type="text" id="ghUser" placeholder="licar33"></div>
    <div class="form-group"><label>Repo</label><input type="text" id="ghRepo" placeholder="tcg-tracker"></div>
    <div class="form-group"><label>Personal Access Token</label><input type="password" id="ghToken" placeholder="ghp_..."></div>
    <button class="btn-primary" onclick="saveSettings()">Enregistrer</button>
  </div>
  <div class="settings-section">
    <h4>Import CSV Cardmarket</h4>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Colle le contenu brut d'un export CSV Cardmarket.</p>
    <div class="import-area"><textarea id="csvInput" placeholder="Shipment nr.;Date of purchase;Article;..."></textarea></div>
    <div class="form-row">
      <button class="btn-primary" style="background:var(--green);color:#000" onclick="importCSV('achat')">Importer Achats</button>
      <button class="btn-primary" style="background:var(--accent-pk)" onclick="importCSV('vente')">Importer Ventes</button>
    </div>
    <div id="importResult" style="margin-top:8px;font-size:12px;color:var(--green)"></div>
  </div>
  <div class="settings-section">
    <h4>Données</h4>
    <div class="form-row">
      <button class="btn-primary" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="exportJSON()">Exporter JSON</button>
      <button class="btn-primary" style="background:var(--red)" onclick="resetData()">Réinitialiser</button>
    </div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<!-- MODAL ACHAT -->
<div class="modal-overlay" id="modalAchat">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalAchat')">✕</button>
    <h3>Nouvel achat</h3>
    <div class="form-group"><label>Nom de la carte / article</label><input type="text" id="a_article" placeholder="Nami (OP09-050) V.2"></div>
    <div class="form-group"><label>Set / Expansion</label><input type="text" id="a_expansion" placeholder="Emperors in the New World"></div>
    <div class="form-row">
      <div class="form-group"><label>Jeu</label><select id="a_jeu"><option value="OP">One Piece</option><option value="PK">Pokémon</option></select></div>
      <div class="form-group"><label>Type</label><select id="a_type"><option>Carte</option><option>Booster</option><option>Display</option><option>ETB</option><option>Bundle</option><option>Blister</option><option>Coffret</option><option>UPC</option><option>Autre</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Prix achat (€)</label><input type="number" id="a_prix" placeholder="25.00" step="0.01" min="0"></div>
      <div class="form-group"><label>Qté</label><input type="number" id="a_qty" value="1" min="1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="a_date"></div>
      <div class="form-group"><label>Plateforme</label><select id="a_plateforme"><option>Cardmarket</option><option>Vinted</option><option>Amazon</option><option>Discord</option><option>Autre</option></select></div>
    </div>
    <button class="btn-primary" onclick="addAchat()">Ajouter au stock</button>
  </div>
</div>

<!-- MODAL VENTE -->
<div class="modal-overlay" id="modalVente">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalVente')">✕</button>
    <h3>Enregistrer une vente</h3>
    <div id="venteArticleInfo" style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px;line-height:1.5;"></div>
    <div class="form-row">
      <div class="form-group"><label>Prix de vente (€)</label><input type="number" id="v_prix" placeholder="0.00" step="0.01" min="0"></div>
      <div class="form-group"><label>Date vente</label><input type="date" id="v_date"></div>
    </div>
    <div class="form-group"><label>Plateforme</label><select id="v_plateforme"><option>Cardmarket</option><option>Vinted</option><option>Discord</option><option>Autre</option></select></div>
    <button class="btn-primary" onclick="confirmVente()">Confirmer la vente</button>
  </div>
</div>

<!-- MODAL EDIT COUT -->
<div class="modal-overlay" id="modalEditCout">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalEditCout')">✕</button>
    <h3>Renseigner le coût d'achat</h3>
    <div id="editVenteInfo" style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px;line-height:1.5;"></div>
    <div class="form-group"><label>Prix d'achat (€)</label><input type="number" id="ec_prix" placeholder="0.00" step="0.01" min="0"></div>
    <button class="btn-primary" onclick="saveEditCout()">Enregistrer</button>
  </div>
</div>

// ─── GITHUB CONFIG ───────────────────────────────────────────────────
const GITHUB_FILE = 'tcg-data.json';

function getGHConfig() {
  return {
    user: localStorage.getItem('gh_user') || 'licar33',
    repo: localStorage.getItem('gh_repo') || 'tcg-tracker',
    token: localStorage.getItem('gh_token') || ''
  };
}

// ─── STATE ───────────────────────────────────────────────────────────
// items already defined above as let items=[...]
let stockFilter = 'all';
let venteFilter = 'all';
let currentSellId = null;
let currentEditVenteId = null;

// ─── INIT ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  loadSettings();
  const loaded = await loadFromGitHub();
  if (loaded) {
    // items replaced by GitHub data
  }
  document.getElementById('a_date').value = today();
  document.getElementById('v_date').value = today();
  renderAll();
});

function today() { return new Date().toISOString().split('T')[0]; }

// ─── GITHUB SYNC ──────────────────────────────────────────────────────
async function loadFromGitHub() {
  const {user, repo, token} = getGHConfig();
  if (!token) return false;
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${GITHUB_FILE}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) return false;
    const json = await r.json();
    const data = JSON.parse(atob(json.content));
    if (data && Array.isArray(data.items)) {
      items = data.items;
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function syncGitHub() {
  const {user, repo, token} = getGHConfig();
  if (!token) { alert('Configure ton token GitHub dans ⚙️ Settings.'); return; }
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  btn.querySelector('svg').style.animation = 'spin 1s linear infinite';
  try {
    let sha = null;
    const check = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${GITHUB_FILE}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (check.ok) { const j = await check.json(); sha = j.sha; }
    const payload = { items };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body = { message: 'Sync TCG tracker', content };
    if (sha) body.sha = sha;
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${GITHUB_FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      btn.textContent = '✓ Synced';
      setTimeout(() => {
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c-1.66 0-3-4.03-3-9s1.34-9 3-9m0 18c1.66 0 3-4.03 3-9s-1.34-9-3-9"/></svg> Sync';
        btn.classList.remove('syncing');
      }, 2000);
    } else {
      alert('Erreur GitHub ' + r.status);
      btn.classList.remove('syncing');
      btn.querySelector('svg').style.animation = '';
    }
  } catch(e) {
    alert('Erreur réseau');
    btn.classList.remove('syncing');
    btn.querySelector('svg').style.animation = '';
  }
}

function saveSettings() {
  localStorage.setItem('gh_user', document.getElementById('ghUser').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
  localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
  alert('Paramètres enregistrés ✓');
}

function loadSettings() {
  document.getElementById('ghUser').value = localStorage.getItem('gh_user') || 'licar33';
  document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || 'tcg-tracker';
  document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
}

// ─── NAVIGATION ───────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabs = ['dashboard','stock','ventes','settings'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  renderAll();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────
function renderDashboard() {
  const stock = items.filter(i => i.st === 'Stock');
  const ventes = items.filter(i => i.st === 'Vendu');

  const totalStock = stock.reduce((a,b) => a + (b.c||0) * (b.q||1), 0);
  const totalVentesBrut = ventes.reduce((a,b) => a + (b.v||0) * (b.q||1), 0);

  const ventesWithCost = ventes.filter(v => v.c !== null && v.c !== undefined);
  const pnl = ventesWithCost.reduce((a,v) => a + ((v.v||0) * 0.95 - (v.c||0)) * (v.q||1), 0);
  const hasUnknown = ventes.some(v => v.c === null || v.c === undefined);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="label">Stock investi</div>
      <div class="value">${fmt(totalStock)}</div>
      <div class="sub">${stock.length} articles</div>
    </div>
    <div class="stat-card">
      <div class="label">Encaissé net</div>
      <div class="value">${fmt(totalVentesBrut * 0.95)}</div>
      <div class="sub">${ventes.length} ventes · −5% CM</div>
    </div>
    <div class="stat-card full">
      <div class="label">P&L réalisé ${hasUnknown ? '<span style="color:var(--accent-pk);font-size:10px">(partiel)</span>' : ''}</div>
      <div class="value ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}${fmt(pnl)}</div>
      <div class="sub">Sur ${ventesWithCost.length}/${ventes.length} ventes avec coût connu</div>
    </div>
  `;

  const opStock = stock.filter(s => s.g === 'OP');
  const pkStock = stock.filter(s => s.g === 'PK');
  const opV = ventes.filter(v => v.g === 'OP');
  const pkV = ventes.filter(v => v.g === 'PK');

  document.getElementById('repartition').innerHTML = `
    <div class="stat-card" style="border-color:rgba(232,163,23,.3)">
      <div class="label" style="color:var(--accent-op)">One Piece</div>
      <div class="value">${fmt(opStock.reduce((a,b)=>a+(b.c||0)*(b.q||1),0))}</div>
      <div class="sub">${opStock.length} en stock · ${opV.length} vendus</div>
    </div>
    <div class="stat-card" style="border-color:rgba(108,142,245,.3)">
      <div class="label" style="color:var(--accent-pk)">Pokémon</div>
      <div class="value">${fmt(pkStock.reduce((a,b)=>a+(b.c||0)*(b.q||1),0))}</div>
      <div class="sub">${pkStock.length} en stock · ${pkV.length} vendus</div>
    </div>
  `;
}

// ─── STOCK ────────────────────────────────────────────────────────────
function setFilter(mode, f) {
  if (mode === 'stock') {
    stockFilter = f;
    document.querySelectorAll('#sfAll,#sfOP,#sfPK').forEach(b => b.classList.remove('active'));
    document.getElementById(f==='all'?'sfAll':f==='OP'?'sfOP':'sfPK').classList.add('active');
    renderStock();
  } else {
    venteFilter = f;
    document.querySelectorAll('#vfAll,#vfOP,#vfPK').forEach(b => b.classList.remove('active'));
    document.getElementById(f==='all'?'vfAll':f==='OP'?'vfOP':'vfPK').classList.add('active');
    renderVentes();
  }
}

function renderStock() {
  const q = document.getElementById('searchStock').value.toLowerCase();
  let list = items.filter(i => i.st === 'Stock').sort((a,b) => (b.d||'').localeCompare(a.d||''));
  if (stockFilter !== 'all') list = list.filter(i => i.g === stockFilter);
  if (q) list = list.filter(i => (i.n||'').toLowerCase().includes(q) || (i.s||'').toLowerCase().includes(q));

  const el = document.getElementById('stockList');
  if (!list.length) { el.innerHTML = `<div class="empty"><div class="icon">📦</div><p>Aucun article en stock</p></div>`; return; }

  el.innerHTML = list.map(item => `
    <div class="card">
      <div class="card-top">
        <span class="jeu-badge ${item.g}">${item.g}</span>
        <div style="flex:1">
          <div class="card-name">${item.n}${item.q > 1 ? ` <span class="qty-badge">×${item.q}</span>` : ''}</div>
          <div class="card-set">${item.s||''}${item.t && item.t!=='Carte' ? ' · <em>'+item.t+'</em>' : ''}</div>
        </div>
      </div>
      <div class="card-bottom">
        <div class="price-info">
          <span class="price-main">${item.c ? fmt(item.c * (item.q||1)) : '—'}</span>
          <span class="price-date">${item.d ? formatDate(item.d) : ''} <span class="src-badge">${item.src||''}</span></span>
        </div>
        <div class="card-actions">
          <button class="btn-sell" onclick="openVenteModal(${item.id})">Vendu</button>
          <button class="btn-del" onclick="deleteItem(${item.id})">✕</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ─── VENTES ───────────────────────────────────────────────────────────
function renderVentes() {
  const q = document.getElementById('searchVente').value.toLowerCase();
  let list = items.filter(i => i.st === 'Vendu').sort((a,b) => (b.d||'').localeCompare(a.d||''));
  if (venteFilter !== 'all') list = list.filter(i => i.g === venteFilter);
  if (q) list = list.filter(i => (i.n||'').toLowerCase().includes(q) || (i.s||'').toLowerCase().includes(q));

  const unknown = items.filter(i => i.st === 'Vendu' && (i.c === null || i.c === undefined)).length;
  const banner = document.getElementById('costAlert');
  if (unknown > 0) { banner.style.display = 'block'; document.getElementById('costCount').textContent = unknown; }
  else { banner.style.display = 'none'; }

  const el = document.getElementById('venteList');
  if (!list.length) { el.innerHTML = `<div class="empty"><div class="icon">💸</div><p>Aucune vente</p></div>`; return; }

  el.innerHTML = list.map(item => {
    let pnlHtml;
    if (item.c !== null && item.c !== undefined) {
      const pnl = (item.v||0) * 0.95 * (item.q||1) - (item.c||0) * (item.q||1);
      const roi = item.c > 0 ? (((item.v||0) * 0.95 - item.c) / item.c * 100).toFixed(0) : '—';
      pnlHtml = `<span class="pnl-badge ${pnl >= 0 ? 'pos' : 'neg'}">${pnl >= 0 ? '+' : ''}${fmt(pnl)} (${roi}%)</span>`;
    } else {
      pnlHtml = `<span class="pnl-badge unknown" onclick="openEditCout(${item.id})">+ coût</span>`;
    }
    return `
      <div class="card">
        <div class="card-top">
          <span class="jeu-badge ${item.g}">${item.g}</span>
          <div style="flex:1">
            <div class="card-name">${item.n}${item.q > 1 ? ` <span class="qty-badge">×${item.q}</span>` : ''}</div>
            <div class="card-set">${item.s||''}</div>
          </div>
        </div>
        <div class="card-bottom">
          <div class="price-info">
            <span class="price-main">${fmt((item.v||0) * (item.q||1))}</span>
            <span class="price-date">${item.d ? formatDate(item.d) : ''} <span class="src-badge">${item.src||''}</span></span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${pnlHtml}
            <button class="btn-del" onclick="deleteItem(${item.id})">✕</button>
          </div>
        </div>
        ${item.c !== null && item.c !== undefined ? `<div style="margin-top:4px;font-size:11px;color:var(--muted)">Acheté ${fmt((item.c||0)*(item.q||1))}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ─── MODALS ───────────────────────────────────────────────────────────
function openAddModal() {
  ['a_article','a_expansion'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('a_prix').value = '';
  document.getElementById('a_qty').value = '1';
  document.getElementById('a_date').value = today();
  document.getElementById('modalAchat').classList.add('open');
}

function openVenteModal(id) {
  currentSellId = id;
  const item = items.find(i => i.id === id);
  document.getElementById('venteArticleInfo').innerHTML = `
    <strong>${item.n}</strong><br>
    <span style="color:var(--muted)">${item.s||''} · ${item.c ? 'Acheté '+fmt(item.c*(item.q||1)) : 'Coût inconnu'}</span>
  `;
  document.getElementById('v_prix').value = '';
  document.getElementById('v_date').value = today();
  document.getElementById('modalVente').classList.add('open');
}

function openEditCout(id) {
  currentEditVenteId = id;
  const v = items.find(i => i.id === id);
  document.getElementById('editVenteInfo').innerHTML = `<strong>${v.n}</strong><br><span style="color:var(--muted)">Vendu ${fmt((v.v||0)*(v.q||1))} · ${v.d ? formatDate(v.d) : ''}</span>`;
  document.getElementById('ec_prix').value = '';
  document.getElementById('modalEditCout').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// ─── ACTIONS ──────────────────────────────────────────────────────────
function addAchat() {
  const n = document.getElementById('a_article').value.trim();
  const c = parseFloat(document.getElementById('a_prix').value);
  if (!n || isNaN(c)) { alert('Remplis le nom et le prix.'); return; }
  const newId = Math.max(...items.map(i=>i.id), 0) + 1;
  items.push({
    id: newId,
    g: document.getElementById('a_jeu').value,
    n,
    s: document.getElementById('a_expansion').value.trim(),
    t: document.getElementById('a_type').value,
    q: parseInt(document.getElementById('a_qty').value) || 1,
    d: document.getElementById('a_date').value,
    c,
    v: null,
    st: 'Stock',
    src: document.getElementById('a_plateforme').value
  });
  closeModal('modalAchat');
  renderAll();
  syncGitHub();
}

function confirmVente() {
  const v = parseFloat(document.getElementById('v_prix').value);
  if (isNaN(v) || v <= 0) { alert('Saisis un prix de vente.'); return; }
  const item = items.find(i => i.id === currentSellId);
  item.v = v;
  item.st = 'Vendu';
  item.src = document.getElementById('v_plateforme').value;
  item.d = document.getElementById('v_date').value;
  closeModal('modalVente');
  renderAll();
  syncGitHub();
}

function saveEditCout() {
  const c = parseFloat(document.getElementById('ec_prix').value);
  if (isNaN(c) || c < 0) { alert('Saisis un prix valide.'); return; }
  const item = items.find(i => i.id === currentEditVenteId);
  if (item) item.c = c;
  closeModal('modalEditCout');
  renderAll();
  syncGitHub();
}

function deleteItem(id) {
  const item = items.find(i => i.id === id);
  if (!confirm(`Supprimer "${item.n}" ?`)) return;
  items = items.filter(i => i.id !== id);
  renderAll();
  syncGitHub();
}

// ─── CSV IMPORT ───────────────────────────────────────────────────────
function importCSV(type) {
  const raw = document.getElementById('csvInput').value.trim();
  if (!raw) { alert('Colle d\'abord le CSV.'); return; }
  const lines = raw.split('\n').filter(l => l.trim() && !l.startsWith('Shipment'));
  let added = 0, dupes = 0;
  const maxId = Math.max(...items.map(i=>i.id), 0);
  lines.forEach((line, idx) => {
    const p = line.split(';');
    if (p.length < 9) return;
    const d = p[1].trim().slice(0,10);
    const n = p[2].trim();
    const s = p[5].trim();
    const cat = p[6].trim();
    const prix = parseFloat(p[8].trim());
    const notes = p[10] ? p[10].trim() : '';
    const g = cat.includes('One Piece') ? 'OP' : 'PK';
    if (type === 'achat') {
      if (items.some(i => i.n === n && i.d === d && i.c === prix && i.st === 'Stock')) { dupes++; return; }
      items.push({ id: maxId+idx+1, g, n, s, t:'Carte', q:1, d, c:prix, v:null, st:'Stock', src:'Cardmarket' });
    } else {
      if (items.some(i => i.n === n && i.d === d && i.v === prix && i.st === 'Vendu')) { dupes++; return; }
      items.push({ id: maxId+idx+1, g, n, s, t:'Carte', q:1, d, c:null, v:prix, st:'Vendu', src:'Cardmarket' });
    }
    added++;
  });
  document.getElementById('importResult').textContent = `✓ ${added} importé(s)${dupes ? ` · ${dupes} doublon(s) ignoré(s)` : ''}`;
  document.getElementById('csvInput').value = '';
  renderAll();
  if (added > 0) syncGitHub();
}

// ─── EXPORT ───────────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify({items}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tcg-data-' + today() + '.json';
  a.click();
}

function resetData() {
  if (!confirm('⚠️ Réinitialiser toutes les données ?')) return;
  location.reload();
}

// ─── HELPERS ──────────────────────────────────────────────────────────
function fmt(v) { return (v||0).toFixed(2).replace('.', ',') + ' €'; }
function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y.slice(2)}`; }
function renderAll() { renderDashboard(); renderStock(); renderVentes(); }
</script>
