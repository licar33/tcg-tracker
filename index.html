<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0e;
  --surface: #12141a;
  --surface2: #1a1d26;
  --border: #2a2d38;
  --text: #e8eaf0;
  --text2: #8b90a0;
  --accent: #00c9a7;
  --accent2: #00a88a;
  --red: #ff4d6a;
  --green: #00c9a7;
  --orange: #ffaa33;
  --blue: #4d9fff;
  --purple: #a855f7;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-accent:hover { background: var(--accent2); }

.stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 16px;
  padding: 20px 24px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; font-family:'JetBrains Mono',monospace; }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stat-green { color: var(--green); }
.stat-red { color: var(--red); }

.filters {
  padding: 0 24px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.tab {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer;
  font-family: inherit; font-size: 13px; transition: all 0.2s;
}
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.tab:hover:not(.active) { border-color: var(--text2); color: var(--text); }

select.filter-select {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: inherit; font-size: 13px;
  cursor: pointer; outline: none;
}

.table-wrap {
  padding: 0 24px 24px; overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 12px; text-align: left; font-size: 11px;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text2);
  border-bottom: 1px solid var(--border); cursor: pointer;
  user-select: none; white-space: nowrap;
}
th:hover { color: var(--text); }
td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 14px; white-space: nowrap;
}
tr:hover td { background: var(--surface2); }
.jeu-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
}
.jeu-OP { background: #1a1040; color: #a855f7; }
.jeu-PK { background: #0f2a1a; color: #4ade80; }
.status-stock { color: var(--blue); }
.status-vendu { color: var(--orange); }
.prix-up { color: var(--green); }
.prix-down { color: var(--red); }
.mono { font-family:'JetBrains Mono',monospace; font-size: 13px; }
.text-right { text-align: right; }
.text-center { text-align: center; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; justify-content: center; align-items: center; z-index: 200;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; font-size: 18px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: inherit; font-size: 14px;
  outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* Progress bar */
.progress-bar {
  display: none; padding: 12px 24px;
}
.progress-bar.show { display: block; }
.progress-inner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px;
}
.progress-text { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.progress-track {
  height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s;
}
.progress-log {
  margin-top: 8px; max-height: 300px; overflow-y: auto;
  font-family:'JetBrains Mono',monospace; font-size: 11px; color: var(--text2);
  white-space: pre-wrap; word-break: break-all;
}
.progress-log div { padding: 2px 0; }
.log-ok { color: var(--green); }
.log-err { color: var(--red); }
.log-skip { color: var(--orange); }

/* Delete button */
.btn-del {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 14px; padding: 4px; opacity: 0; transition: all 0.2s;
}
tr:hover .btn-del { opacity: 1; }
.btn-del:hover { color: var(--red); }

/* Edit inline */
td.editable { cursor: pointer; }
td.editable:hover { background: var(--surface); outline: 1px dashed var(--border); }

@media (max-width: 768px) {
  .stats { grid-template-columns: repeat(2,1fr); gap: 10px; padding: 12px; }
  .stat-value { font-size: 22px; }
  .header { padding: 12px; }
  .filters { padding: 0 12px 12px; }
  .table-wrap { padding: 0 12px 12px; }
  td, th { padding: 8px 6px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🃏 TCG <span>Tracker</span></div>
  <div class="header-actions">
    <button class="btn" onclick="testAPI()" id="btnTest">🧪 Test API</button>
    <button class="btn" onclick="updatePrices()" id="btnMaj">🔄 Màj Prix</button>
    <button class="btn" onclick="exportCSV()">📥 CSV</button>
    <button class="btn btn-accent" onclick="showAddModal()">+ Ajouter</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="progress-bar" id="progressBar">
  <div class="progress-inner">
    <div class="progress-text" id="progressText">Mise à jour des prix...</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-log" id="progressLog"></div>
  </div>
</div>

<div class="filters">
  <button class="tab active" data-filter="all" onclick="setGameFilter('all',this)">Tous</button>
  <button class="tab" data-filter="OP" onclick="setGameFilter('OP',this)">One Piece</button>
  <button class="tab" data-filter="PK" onclick="setGameFilter('PK',this)">Pokémon</button>
  <select class="filter-select" onchange="setStatusFilter(this.value)">
    <option value="all">Tous statuts</option>
    <option value="Stock">En stock</option>
    <option value="Vendu">Vendus</option>
  </select>
  <select class="filter-select" onchange="setTypeFilter(this.value)">
    <option value="all">Tous types</option>
    <option value="Carte">Cartes</option>
    <option value="Booster">Boosters</option>
    <option value="Scellé">Scellés</option>
    <option value="Display">Displays</option>
    <option value="Gradée">Gradées</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('jeu')">Jeu</th>
        <th onclick="sortBy('nom')">Nom</th>
        <th onclick="sortBy('type')">Type</th>
        <th onclick="sortBy('qte')" class="text-center">Qté</th>
        <th onclick="sortBy('statut')">Statut</th>
        <th onclick="sortBy('cout_total')" class="text-right">Coût</th>
        <th onclick="sortBy('prix_marche')" class="text-right">Marché</th>
        <th onclick="sortBy('vente')" class="text-right">Vente</th>
        <th onclick="sortBy('pl')" class="text-right">P&L</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Ajouter un item</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Jeu</label>
        <select id="fJeu"><option value="OP">One Piece</option><option value="PK">Pokémon</option></select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="fType"><option>Carte</option><option>Booster</option><option>Scellé</option><option>Display</option><option>Gradée</option></select>
      </div>
    </div>
    <div class="form-group"><label>Nom</label><input id="fNom" placeholder="Ex: Monkey D. Luffy (OP13-118)"></div>
    <div class="form-group"><label>Expansion</label><input id="fExp" placeholder="Ex: Carrying on his Will"></div>
    <div class="form-row">
      <div class="form-group"><label>Quantité</label><input id="fQte" type="number" value="1" min="1"></div>
      <div class="form-group"><label>Prix unitaire (€)</label><input id="fPrix" type="number" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date d'achat</label><input id="fDate" type="date"></div>
      <div class="form-group"><label>Source</label><select id="fSource"><option>Cardmarket</option><option>Vinted</option><option>Autre</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="addItem()">Ajouter</button>
    </div>
  </div>
</div>

let items = [];

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  const stored = localStorage.getItem('tcg_tracker_items');
  if (stored) {
    try {
      items = JSON.parse(stored);
      // Check if we need to merge seed data (new items from CSV)
      if (items.length < SEED_DATA.length) {
        mergeSeedData();
      }
    } catch(e) {
      items = JSON.parse(JSON.stringify(SEED_DATA));
    }
  } else {
    items = JSON.parse(JSON.stringify(SEED_DATA));
  }
  save();
  render();
}

function mergeSeedData() {
  const existingNames = new Set(items.map(i => i.nom + '|' + i.jeu + '|' + i.statut));
  for (const seed of SEED_DATA) {
    const key = seed.nom + '|' + seed.jeu + '|' + seed.statut;
    if (!existingNames.has(key)) {
      seed.id = Math.max(...items.map(i=>i.id), 0) + 1;
      items.push(seed);
      existingNames.add(key);
    }
  }
}

function save() {
  localStorage.setItem('tcg_tracker_items', JSON.stringify(items));
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  renderStats();
  renderTable();
}

function renderStats() {
  const stock = items.filter(i => i.statut === 'Stock');
  const sold = items.filter(i => i.statut === 'Vendu');
  
  const totalInvested = items.reduce((s,i) => s + (i.cout_total || 0), 0);
  const stockValue = stock.reduce((s,i) => {
    const mkt = i.prix_marche;
    return s + (mkt ? mkt * i.qte : 0);
  }, 0);
  
  // Net revenue = vente - 5% commission (for Cardmarket sales)
  const totalSoldGross = sold.reduce((s,i) => s + (i.vente_total || 0), 0);
  const totalSoldNet = sold.reduce((s,i) => {
    const v = i.vente_total || 0;
    const src = i.source || '';
    const comm = src.includes('Vinted') ? 0 : v * COMMISSION;
    return s + (v - comm);
  }, 0);
  
  const costOfSold = sold.reduce((s,i) => s + (i.cout_total || 0), 0);
  const realizedPL = totalSoldNet - costOfSold;
  const roi = totalInvested > 0 ? (realizedPL / totalInvested * 100) : 0;
  
  const opCount = items.filter(i => i.jeu === 'OP').length;
  const pkCount = items.filter(i => i.jeu === 'PK').length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Investi</div>
      <div class="stat-value">${fmt(totalInvested)}</div>
      <div class="stat-sub">${items.length} items · OP ${opCount} · PK ${pkCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Valeur Stock (Marché)</div>
      <div class="stat-value">${stockValue > 0 ? fmt(stockValue) : '—'}</div>
      <div class="stat-sub">${stock.length} en portefeuille</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Revenus Ventes</div>
      <div class="stat-value">${fmt(totalSoldNet)}</div>
      <div class="stat-sub">${sold.length} vendus · net frais</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">P&L Réalisé</div>
      <div class="stat-value ${realizedPL >= 0 ? 'stat-green' : 'stat-red'}">${realizedPL >= 0 ? '+' : ''}${fmt(realizedPL)}</div>
      <div class="stat-sub">ROI ${roi.toFixed(1)}%</div>
    </div>
  `;
}

function renderTable() {
  let filtered = items.filter(i => {
    if (gameFilter !== 'all' && i.jeu !== gameFilter) return false;
    if (statusFilter !== 'all' && i.statut !== statusFilter) return false;
    if (typeFilter !== 'all' && i.type !== typeFilter) return false;
    return true;
  });
  
  filtered.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'pl') {
      va = calcPL(a); vb = calcPL(b);
    }
    if (va == null) va = sortDir > 0 ? Infinity : -Infinity;
    if (vb == null) vb = sortDir > 0 ? Infinity : -Infinity;
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
  
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(i => {
    const pl = calcPL(i);
    const plClass = pl > 0 ? 'prix-up' : pl < 0 ? 'prix-down' : '';
    const mkt = i.prix_marche;
    const mktDisplay = mkt ? fmt(mkt) : '—';
    const mktDiff = mkt && i.cout ? ((mkt - i.cout) / i.cout * 100) : null;
    let mktClass = '';
    if (mktDiff !== null) mktClass = mktDiff >= 0 ? 'prix-up' : 'prix-down';
    
    const venteDisplay = i.statut === 'Vendu' && i.vente != null ? fmt(i.vente) : 
                         (i.statut === 'Stock' && mkt ? `<span class="${mktClass}">${mktDisplay}</span>` : '—');
    
    return `<tr>
      <td><span class="jeu-badge jeu-${i.jeu}">${i.jeu}</span></td>
      <td title="${i.expansion || ''}">${truncate(i.nom, 35)}</td>
      <td>${i.type}</td>
      <td class="text-center">${i.qte}</td>
      <td><span class="status-${i.statut.toLowerCase()}">${i.statut}</span></td>
      <td class="text-right mono">${fmt(i.cout_total)}</td>
      <td class="text-right mono ${mktClass}">${i.statut === 'Stock' ? mktDisplay : '—'}</td>
      <td class="text-right mono">${i.statut === 'Vendu' && i.vente != null ? fmt(i.vente) : '—'}</td>
      <td class="text-right mono ${plClass}">${pl !== null ? (pl >= 0 ? '+' : '') + fmt(pl) : '—'}</td>
      <td><button class="btn-del" onclick="deleteItem(${i.id})" title="Supprimer">✕</button></td>
    </tr>`;
  }).join('');
}

function calcPL(item) {
  if (item.statut === 'Vendu' && item.vente != null) {
    const gross = (item.vente_total || item.vente * item.qte);
    const comm = (item.source || '').includes('Vinted') ? 0 : gross * COMMISSION;
    return gross - comm - (item.cout_total || 0);
  }
  if (item.statut === 'Stock' && item.prix_marche) {
    return (item.prix_marche * item.qte) - (item.cout_total || 0);
  }
  return null;
}

function fmt(n) { return n != null ? n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' €' : '—'; }
function truncate(s, n) { return s.length > n ? s.substring(0, n) + '…' : s; }

// ═══════════════════════════════════════════
// FILTERS & SORT
// ═══════════════════════════════════════════
function setGameFilter(f, el) {
  gameFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}
function setStatusFilter(v) { statusFilter = v; renderTable(); }
function setTypeFilter(v) { typeFilter = v; renderTable(); }
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderTable();
}

function showAddModal() { document.getElementById('addModal').classList.add('show'); }
function closeModal() { document.getElementById('addModal').classList.remove('show'); }

function addItem() {
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) return alert('Nom requis');
  const prix = parseFloat(document.getElementById('fPrix').value) || 0;
  const qte = parseInt(document.getElementById('fQte').value) || 1;
  
  const newItem = {
    id: Math.max(...items.map(i=>i.id), 0) + 1,
    jeu: document.getElementById('fJeu').value,
    nom: nom,
    nom_en: '',
    type: document.getElementById('fType').value,
    qte: qte,
    statut: 'Stock',
    cout: prix,
    cout_total: prix * qte,
    vente: null,
    vente_total: null,
    source: document.getElementById('fSource').value,
    date_achat: document.getElementById('fDate').value || null,
    expansion: document.getElementById('fExp').value || null,
    product_id: null,
    prix_marche: null
  };
  
  items.push(newItem);
  save();
  render();
  closeModal();
  
  // Reset form
  document.getElementById('fNom').value = '';
  document.getElementById('fPrix').value = '';
  document.getElementById('fQte').value = '1';
  document.getElementById('fExp').value = '';
}

function deleteItem(id) {
  if (!confirm('Supprimer cet item ?')) return;
  items = items.filter(i => i.id !== id);
  save();
  render();
}

  const headers = ['Jeu','Nom','Type','Qté','Statut','Coût Unit','Coût Total','Prix Marché','Prix Vente','P&L','Source','Date Achat','Expansion'];
  const rows = items.map(i => [
    i.jeu, i.nom, i.type, i.qte, i.statut,
    i.cout, i.cout_total, i.prix_marche || '',
    i.vente || '', calcPL(i) || '',
    i.source || '', i.date_achat || '', i.expansion || ''
  ]);
  
  let csv = headers.join(';') + '\n';
  rows.forEach(r => {
    csv += r.map(v => typeof v === 'string' && v.includes(';') ? '"'+v+'"' : v).join(';') + '\n';
  });
  
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tcg_tracker_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

async function testAPI() {
  const bar = document.getElementById('progressBar');
  const log = document.getElementById('progressLog');
  const text = document.getElementById('progressText');
  bar.classList.add('show');
  log.innerHTML = '';
  text.textContent = '🧪 Test API en cours...';
  
  // Try all possible hosts
  const hosts = [
    'cardmarket-api-tcg.p.rapidapi.com',
    'cardmarket-api.p.rapidapi.com'
  ];
  
  for (const host of hosts) {
    addLog(log, `\n━━━ Test host: ${host} ━━━`, '');
    
    // Test One Piece
    const urlOP = `https://${host}/onepiece/cards?search=Monkey+D+Luffy`;
    addLog(log, `→ GET onepiece/cards?search=Monkey+D+Luffy`, '');
    try {
      const resp = await fetch(urlOP, {
        headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': host }
      });
      addLog(log, `← Status: ${resp.status} ${resp.statusText}`, resp.ok ? 'log-ok' : 'log-err');
      if (resp.ok) {
        const data = await resp.json();
        const raw = JSON.stringify(data).substring(0, 500);
        addLog(log, `← Data type: ${typeof data}, isArray: ${Array.isArray(data)}`, 'log-ok');
        addLog(log, `← Raw (500 chars): ${raw}`, 'log-ok');
        
        // Try to extract cards
        let cards = [];
        if (Array.isArray(data)) cards = data;
        else {
          for (const key of Object.keys(data)) {
            if (Array.isArray(data[key])) {
              addLog(log, `← Found array at key "${key}" with ${data[key].length} items`, 'log-ok');
              cards = data[key];
              break;
            }
          }
          if (cards.length === 0) addLog(log, `← Object keys: ${Object.keys(data).join(', ')}`, 'log-skip');
        }
        
        if (cards.length > 0) {
          const c = cards[0];
          addLog(log, `← First card keys: ${Object.keys(c).join(', ')}`, 'log-ok');
          if (c.prices) addLog(log, `← prices keys: ${Object.keys(c.prices).join(', ')}`, 'log-ok');
          if (c.prices?.cardmarket) addLog(log, `← cardmarket: ${JSON.stringify(c.prices.cardmarket).substring(0, 300)}`, 'log-ok');
          
          // Try extract price
          const cm = c.prices?.cardmarket || {};
          const price = cm.lowest_near_mint_FR || cm.lowest_near_mint || cm['30d_average'] || cm['7d_average'] || cm.trend;
          addLog(log, `✅ Prix extrait: ${price}€`, 'log-ok');
          addLog(log, `\n🎉 HOST FONCTIONNEL: ${host}`, 'log-ok');
          text.textContent = `✅ API OK avec ${host} — prix trouvé: ${price}€. Tu peux cliquer "Màj Prix" !`;
          
          // Save working host
          localStorage.setItem('tcg_api_host', host);
          return;
        }
      } else {
        const errText = await resp.text();
        addLog(log, `← Error body: ${errText.substring(0, 200)}`, 'log-err');
      }
    } catch(e) {
      addLog(log, `← Exception: ${e.message}`, 'log-err');
    }
    
    // Test Pokémon too
    const urlPK = `https://${host}/pokemon/cards?search=charizard+ex`;
    addLog(log, `→ GET ${urlPK}`, '');
    try {
      const resp = await fetch(urlPK, {
        headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': host }
      });
      addLog(log, `← Status: ${resp.status}`, resp.ok ? 'log-ok' : 'log-err');
      if (resp.ok) {
        const data = await resp.json();
        addLog(log, `← Type: ${typeof data}, isArray: ${Array.isArray(data)}, keys: ${typeof data === 'object' && !Array.isArray(data) ? Object.keys(data).join(',') : 'N/A'}`, 'log-ok');
        
        let cards = Array.isArray(data) ? data : (data.data || data.results || data.cards || []);
        if (cards.length > 0) {
          addLog(log, `← ${cards.length} cards found`, 'log-ok');
          addLog(log, `\n🎉 HOST FONCTIONNEL: ${host}`, 'log-ok');
          localStorage.setItem('tcg_api_host', host);
          text.textContent = `✅ API OK avec ${host}. Tu peux cliquer "Màj Prix" !`;
          return;
        }
      }
    } catch(e) {
      addLog(log, `← Exception: ${e.message}`, 'log-err');
    }
  }
  
  text.textContent = '❌ Aucun host ne fonctionne — vérifie ta clé API sur RapidAPI';
  addLog(log, '\n❌ Aucun host trouvé. Vérifie sur https://rapidapi.com/tcggopro/api/cardmarket-api-tcg que tu es bien abonné (même au plan gratuit).', 'log-err');
}

async function updatePrices() {
  const stockCards = items.filter(i => i.statut === 'Stock' && i.type === 'Carte');
  if (stockCards.length === 0) return alert('Aucune carte en stock à mettre à jour.');
  
  // Get working host (from test or default)
  const workingHost = localStorage.getItem('tcg_api_host') || API_HOST;
  
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  const log = document.getElementById('progressLog');
  
  bar.classList.add('show');
  log.innerHTML = '';
  document.getElementById('btnMaj').disabled = true;
  
  addLog(log, `Host API: ${workingHost}`, '');
  
  let done = 0;
  let updated = 0;
  let errors = 0;
  const total = stockCards.length;
  
  for (const item of stockCards) {
    done++;
    const pct = Math.round(done / total * 100);
    fill.style.width = pct + '%';
    text.textContent = `Mise à jour: ${done}/${total} (${updated} ok, ${errors} erreurs)`;
    
    try {
      const price = await fetchCardPrice(item, workingHost);
      if (price !== null) {
        item.prix_marche = price;
        updated++;
        addLog(log, `✓ ${item.nom}: ${price.toFixed(2)}€`, 'log-ok');
      } else {
        addLog(log, `⊘ ${item.nom}: non trouvé`, 'log-skip');
      }
    } catch(e) {
      errors++;
      addLog(log, `✗ ${item.nom}: ${e.message}`, 'log-err');
      // If rate limited, stop
      if (e.message.includes('429') || e.message.includes('Rate limit')) {
        addLog(log, '🛑 Rate limit atteint — arrêt. Réessaie demain.', 'log-err');
        break;
      }
    }
    
    // Rate limit: wait 800ms between requests
    if (done < total) await sleep(800);
  }
  
  save();
  render();
  text.textContent = `Terminé: ${updated} prix mis à jour, ${errors} erreurs sur ${total} cartes`;
  document.getElementById('btnMaj').disabled = false;
}

async function fetchCardPrice(item, host) {
  const gamePath = item.jeu === 'OP' ? 'onepiece' : 'pokemon';
  
  const nameStr = item.nom_en || item.nom;
  
  // Extract card number for matching later (OP13-118, ST21-014, etc.)
  const cardNumMatch = nameStr.match(/((?:OP|ST|EB|PRB|P)\d*-\d+)/i);
  
  // Build search query — ALWAYS search by NAME, not card number
  let searchQuery = '';
  
  // Extract the character/card name (before first parenthesis)
  let cleanName = nameStr
    .replace(/\(V\.\d+\)/g, '')       // remove (V.1), (V.2)
    .replace(/\([^)]*\)/g, '')         // remove all parentheses content
    .replace(/\d+\/\d+/g, '')          // remove 199/197
    .replace(/gradée?/gi, '')
    .replace(/PCA\d+/gi, '')
    .replace(/PSA\d+/gi, '')
    .replace(/CCC\s*\d+\.?\d*/gi, '')
    .replace(/\./g, ' ')              // Monkey.D.Luffy → Monkey D Luffy
    .replace(/\s+/g, ' ')
    .trim();
  
  // Take the meaningful words (skip very short ones)
  const words = cleanName.split(/\s+/).filter(w => w.length > 1);
  
  if (item.jeu === 'OP') {
    // For One Piece: use full character name (e.g. "Monkey D Luffy", "Tashigi", "Nami")
    // But also add card number if available for better precision
    searchQuery = words.slice(0, 4).join(' ');
    // If the name is very short (like "Nami"), add the set number for specificity
    if (searchQuery.length <= 4 && cardNumMatch) {
      searchQuery = searchQuery + ' ' + cardNumMatch[1];
    }
  } else {
    // For Pokémon: use the card name
    searchQuery = words.slice(0, 3).join(' ');
  }
  
  if (!searchQuery || searchQuery.length < 2) return null;
  
  const url = `https://${host}/${gamePath}/cards?search=${encodeURIComponent(searchQuery)}`;
  
  const resp = await fetch(url, {
    headers: {
      'x-rapidapi-key': API_KEY,
      'x-rapidapi-host': host
    }
  });
  
  if (resp.status === 429) throw new Error('429 Rate limit');
  if (resp.status === 403) throw new Error('403 Forbidden — clé API invalide?');
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  
  const data = await resp.json();
  
  // Parse cards — API returns { data: [...], paging: {...}, results: N }
  let cards = [];
  if (Array.isArray(data)) {
    cards = data;
  } else if (data && typeof data === 'object') {
    for (const key of ['data', 'results', 'cards', 'items']) {
      if (Array.isArray(data[key])) {
        cards = data[key];
        break;
      }
    }
    if (cards.length === 0 && data.prices) {
      cards = [data];
    }
  }
  
  if (cards.length === 0) return null;
  
  // Find best match by card number if we have one
  let bestCard = null;
  if (cardNumMatch) {
    const num = cardNumMatch[1].toUpperCase();
    bestCard = cards.find(c => {
      const haystack = [
        c.card_number, c.number, c.code, c.id_text,
        c.name_numbered, c.name, c.full_name, c.slug
      ].filter(Boolean).map(s => String(s).toUpperCase()).join(' ');
      return haystack.includes(num);
    });
  }
  if (!bestCard) bestCard = cards[0];
  
  // Extract price — documented: prices.cardmarket.lowest_near_mint_FR etc.
  const prices = bestCard.prices || bestCard.price || {};
  const cm = prices.cardmarket || prices.cm || prices;
  
  const candidates = [
    cm.lowest_near_mint_FR,
    cm.lowest_near_mint,
    cm['30d_average'],
    cm['7d_average'],
    cm.trend,
    cm.avg,
    cm.low,
    cm.price,
    cm.market_price,
    bestCard.price_from,
    bestCard.price,
    bestCard.trend
  ];
  
  for (const p of candidates) {
    if (typeof p === 'number' && p > 0) return p;
    if (typeof p === 'string') {
      const n = parseFloat(p);
      if (!isNaN(n) && n > 0) return n;
    }
  }
  
  return null;
}

function addLog(el, msg, cls) {
  const d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
